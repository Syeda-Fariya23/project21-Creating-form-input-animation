<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Form </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <!-- This is the main container where the form is placed inside the container -->
        <h1>Please <span class="special">Login</span></h1>
        <form>
            <!-- from here the form starts  
            Section is created with a class name form-content which contains the input tag along with label tag 
            input tag contains the required which means should be filled compulsory if not filled it will not login-->
            <section class="Form-content">

                <input type="text" required>
                <label>Email</label>
            </section>
            <section class="Form-content">
                <input type="password" required>
                <label>Password</label>
            </section>
            <button class="btn">Login</button>
        </form>
    </main>
    <script src="app.js"></script>
</body>

</html>
